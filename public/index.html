<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Reco</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <main class="container">
    <h1>OKOCHA PROD</h1>

    <div class="forms-wrapper">
      <section class="card" id="signup-section">
        <h2>Créer un compte</h2>
        <form id="signup-form">
          <input type="text" id="signup-username" placeholder="Nom d'utilisateur" required>
          <input type="password" id="signup-password" placeholder="Mot de passe" required>
          <button type="submit">S'inscrire</button>
        </form>
      </section>

      <section class="card" id="login-section">
        <h2>Se connecter</h2>
        <form id="login-form">
          <input type="text" id="login-username" placeholder="Nom d'utilisateur" required>
          <input type="password" id="login-password" placeholder="Mot de passe" required>
          <button type="submit">Se connecter</button>
        </form>
      </section>
    </div>

    <p id="message"></p>
  </main>

  <script src="js/app.js"></script>
</body>
</html>
